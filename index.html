<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Faça o Seu Login</h1>
        <div class="container-form">
            <form action="">
                <input type="text" name="nome" id="nome" placeholder="Coloque o Seu Nome" >
                <input type="password" name="senha" id="senha" placeholder="Senha" maxlength="12" minlength="5">
                <input type="submit" value="Login" id="Login-Enviar">
            </form>
        </div>
    </div>
</body>
</html>
